services:
  # 🐘 1. 배포용 독립 PostgreSQL 데이터베이스
  db:
    image: postgres:16-alpine
    container_name: production_db
    environment:
      POSTGRES_DB: kslove_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password123! # ⚠️ 실제 배포시 강력한 비밀번호로 변경!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"

  # 🐍 2. 장고 백엔드 서비스
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8000:8000"

  # 🌐 3. 엔진엑스 프록시 + 리액트 정적 서빙 마스터 (최전방 문지기)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data: